<div class="relative w-64">
    <button
        *ngIf="selectedItem"
        (click)="toggle()"
        class="w-full bg-white border border-gray-300 rounded-md px-4 py-2 text-left shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        {{ selectedItem.name || placeholder }}
        <span class="float-right">▼</span>
    </button>

    <ul
        *ngIf="isOpen"
        class="absolute z-10 mt-1 w-full bg-white border border-gray-200 rounded-md shadow-lg max-h-60 overflow-auto">
        <li
            *ngFor="let item of items"
            (click)="select(item)"
            class="px-4 py-2 cursor-pointer hover:bg-blue-50 hover:text-blue-700 transition-colors">
            {{ item.name }}
        </li>
    </ul>
</div>
